<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>자세교정 Arduino 연동 프로그램</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111827;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
      font-size: 28px;
    }

    #container {
      position: relative;
      width: 960px;
      height: 720px;
      margin: 20px auto;
      border-radius: 20px;
      overflow: hidden;
      background: black;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.6);
    }

    video, canvas {
      position: absolute;
      width: 960px;
      height: 720px;
      left: 0;
      top: 0;
      transform: scaleX(-1);
    }

    #infoPanel {
      width: 900px;
      margin: 20px auto;
      padding: 20px;
      background: #1f2937;
      border-radius: 16px;
      box-shadow: 0 0 12px rgba(0, 0, 0, 0.3);
    }

    #scoreText {
      font-size: 30px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    #stateText {
      font-size: 30px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    #detailText {
      font-size: 18px;
      color: #d1d5db;
      line-height: 1.6;
    }

    button {
      padding: 12px 22px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      margin: 8px;
      cursor: pointer;
      background: #2563eb;
      color: white;
    }

    button:hover {
      background: #1d4ed8;
    }

    #arduinoStatus {
      margin-top: 10px;
      font-size: 18px;
      color: #facc15;
    }

    .excellent {
      color: #4ade80;
    }

    .good {
      color: #22c55e;
    }

    .normal {
      color: #facc15;
    }

    .bad {
      color: #fb923c;
    }

    .very-bad {
      color: #ef4444;
    }
  </style>
</head>

<body>
  <h1>웹캠 자세교정 + Arduino 피드백 시스템</h1>

  <div>
    <button id="connectArduinoBtn">Arduino 연결</button>
    <button id="startBtn">카메라 시작</button>
    <div id="arduinoStatus">Arduino 연결 안 됨</div>
  </div>

  <div id="container">
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
  </div>

  <div id="infoPanel">
    <div id="scoreText">자세 점수: -</div>
    <div id="stateText">상태: 대기 중</div>
    <div id="detailText">
      카메라를 시작하고 Arduino를 연결하면 자세 상태에 따라 LED, 부저, 모터가 작동합니다.
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

  <script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    const scoreText = document.getElementById("scoreText");
    const stateText = document.getElementById("stateText");
    const detailText = document.getElementById("detailText");
    const arduinoStatus = document.getElementById("arduinoStatus");

    canvas.width = 960;
    canvas.height = 720;

    let port = null;
    let writer = null;
    let lastSentState = "";

    let latestPoseLandmarks = null;
    let latestFaceLandmarks = null;

    document.getElementById("connectArduinoBtn").addEventListener("click", async () => {
      try {
        if (!("serial" in navigator)) {
          alert("이 브라우저는 Web Serial API를 지원하지 않습니다. Chrome 또는 Edge를 사용하세요.");
          return;
        }

        port = await navigator.serial.requestPort();
        await port.open({ baudRate: 9600 });

        const textEncoder = new TextEncoderStream();
        textEncoder.readable.pipeTo(port.writable);
        writer = textEncoder.writable.getWriter();

        arduinoStatus.textContent = "Arduino 연결 완료";
        arduinoStatus.style.color = "#22c55e";

        console.log("Arduino 연결 완료");
      } catch (err) {
        console.error("Arduino 연결 실패:", err);
        arduinoStatus.textContent = "Arduino 연결 실패";
        arduinoStatus.style.color = "#ef4444";
      }
    });

    async function sendPostureState(state) {
      if (!writer) return;

      if (state === lastSentState) return;

      lastSentState = state;

      try {
        await writer.write(state + "\n");
        console.log("Arduino 전송:", state);
      } catch (err) {
        console.error("Arduino 전송 실패:", err);
      }
    }

    function getAngleDegree(p1, p2) {
      const dx = p2.x - p1.x;
      const dy = p2.y - p1.y;
      return Math.atan2(dy, dx) * 180 / Math.PI;
    }

    function getHorizontalTiltDegree(p1, p2) {
      const angle = getAngleDegree(p1, p2);
      let tilt = Math.abs(angle);

      if (tilt > 90) {
        tilt = 180 - tilt;
      }

      return tilt;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function drawPoint(point, color, radius = 6) {
      ctx.beginPath();
      ctx.arc(point.x * canvas.width, point.y * canvas.height, radius, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
    }

    function drawLine(p1, p2, color, width = 4) {
      ctx.beginPath();
      ctx.moveTo(p1.x * canvas.width, p1.y * canvas.height);
      ctx.lineTo(p2.x * canvas.width, p2.y * canvas.height);
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      ctx.stroke();
    }

    // ===============================
    // 자세 점수 계산용 감점 함수
    //
    // 매우 준수는 거의 완전 정자세에서만 나오도록 설정.
    // 눈으로도 많이 기울어진 자세는 60점 아래로 내려가기 쉽게 설정.
    // ===============================

    function shoulderPenalty(tilt) {
      if (tilt <= 2) return 0;          // 거의 완전 수평
      if (tilt <= 5) return 3;          // 매우 약한 기울기
      if (tilt <= 8) return 8;          // 준수에서 약간 벗어남
      if (tilt <= 12) return 16;        // 보통 수준
      if (tilt <= 16) return 26;        // 불량에 가까움
      if (tilt <= 22) return 38;        // 눈에 보이는 기울기
      return 48;                        // 많이 기울어짐
    }

    function headPenalty(tilt) {
      if (tilt <= 2) return 0;
      if (tilt <= 5) return 3;
      if (tilt <= 8) return 8;
      if (tilt <= 12) return 15;
      if (tilt <= 16) return 24;
      if (tilt <= 22) return 34;
      return 44;
    }

    function bodyLeanPenalty(lean) {
      if (lean <= 0.015) return 0;      // 거의 정중앙
      if (lean <= 0.030) return 3;
      if (lean <= 0.050) return 8;
      if (lean <= 0.075) return 16;
      if (lean <= 0.100) return 26;
      if (lean <= 0.140) return 38;
      return 48;
    }

    // ===============================
    // 점수에 따른 5단계 상태 분류
    //
    // 95 ~ 100 : 매우 준수
    // 85 ~ 94  : 준수
    // 70 ~ 84  : 보통
    // 60 ~ 69  : 불량
    // 0 ~ 59   : 매우 불량
    // ===============================
    function classifyPosture(score) {
      if (score >= 95) {
        return {
          state: "EXCELLENT",
          label: "매우 준수",
          className: "excellent"
        };
      } else if (score >= 85) {
        return {
          state: "GOOD",
          label: "준수",
          className: "good"
        };
      } else if (score >= 70) {
        return {
          state: "NORMAL",
          label: "보통",
          className: "normal"
        };
      } else if (score >= 60) {
        return {
          state: "BAD",
          label: "불량",
          className: "bad"
        };
      } else {
        return {
          state: "VERY_BAD",
          label: "매우 불량",
          className: "very-bad"
        };
      }
    }

    function makeMessage(result, shoulderTilt, bodyLean, headTilt) {
      const messages = [];

      if (shoulderTilt > 16) {
        messages.push("어깨가 눈에 띄게 기울어졌습니다.");
      } else if (shoulderTilt > 8) {
        messages.push("어깨가 약간 기울어졌습니다.");
      }

      if (bodyLean > 0.10) {
        messages.push("상체가 한쪽으로 많이 치우쳤습니다.");
      } else if (bodyLean > 0.05) {
        messages.push("상체 중심이 약간 치우쳤습니다.");
      }

      if (headTilt > 16) {
        messages.push("머리가 눈에 띄게 기울어졌습니다.");
      } else if (headTilt > 8) {
        messages.push("머리가 약간 기울어졌습니다.");
      }

      if (messages.length === 0) {
        if (result.state === "EXCELLENT") {
          messages.push("거의 완전한 정자세입니다.");
        } else if (result.state === "GOOD") {
          messages.push("자세가 준수합니다.");
        } else if (result.state === "NORMAL") {
          messages.push("자세가 보통 수준입니다.");
        } else if (result.state === "BAD") {
          messages.push("자세가 불량합니다.");
        } else {
          messages.push("자세가 매우 불량합니다.");
        }
      }

      return messages.join(" ");
    }

    function analyzePosture() {
      if (!latestPoseLandmarks) {
        return {
          score: 0,
          state: "VERY_BAD",
          label: "매우 불량",
          className: "very-bad",
          message: "사람이 감지되지 않았습니다.",
          shoulderTilt: "-",
          bodyLean: "-",
          headTilt: "-"
        };
      }

      const leftShoulder = latestPoseLandmarks[11];
      const rightShoulder = latestPoseLandmarks[12];
      const leftHip = latestPoseLandmarks[23];
      const rightHip = latestPoseLandmarks[24];

      const shoulderTilt = getHorizontalTiltDegree(leftShoulder, rightShoulder);

      const shoulderCenter = {
        x: (leftShoulder.x + rightShoulder.x) / 2,
        y: (leftShoulder.y + rightShoulder.y) / 2
      };

      const hipCenter = {
        x: (leftHip.x + rightHip.x) / 2,
        y: (leftHip.y + rightHip.y) / 2
      };

      const bodyLean = Math.abs(shoulderCenter.x - hipCenter.x);

      let headTilt = 0;

      if (latestFaceLandmarks) {
        const leftEye = latestFaceLandmarks[33];
        const rightEye = latestFaceLandmarks[263];

        headTilt = getHorizontalTiltDegree(leftEye, rightEye);
      }

      const sPenalty = shoulderPenalty(shoulderTilt);
      const bPenalty = bodyLeanPenalty(bodyLean);
      const hPenalty = headPenalty(headTilt);

      let score = 100 - sPenalty - bPenalty - hPenalty;
      score = clamp(Math.round(score), 0, 100);

      const result = classifyPosture(score);
      const message = makeMessage(result, shoulderTilt, bodyLean, headTilt);

      return {
        score,
        state: result.state,
        label: result.label,
        className: result.className,
        message,
        shoulderTilt: shoulderTilt.toFixed(1),
        bodyLean: bodyLean.toFixed(3),
        headTilt: headTilt.toFixed(1),
        shoulderPenalty: sPenalty,
        bodyPenalty: bPenalty,
        headPenalty: hPenalty
      };
    }

    function updateUI(result) {
      scoreText.textContent = `자세 점수: ${result.score}`;
      stateText.textContent = `상태: ${result.label}`;
      stateText.className = result.className;

      detailText.innerHTML = `
        ${result.message}<br>
        어깨 기울기: ${result.shoulderTilt}도 / 감점: ${result.shoulderPenalty ?? "-"}점<br>
        몸 중심 기울기: ${result.bodyLean} / 감점: ${result.bodyPenalty ?? "-"}점<br>
        머리 기울기: ${result.headTilt}도 / 감점: ${result.headPenalty ?? "-"}점
      `;
    }

    function onPoseResults(results) {
      latestPoseLandmarks = results.poseLandmarks || null;
      drawEverything();
    }

    function onFaceResults(results) {
      if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
        latestFaceLandmarks = results.multiFaceLandmarks[0];
      } else {
        latestFaceLandmarks = null;
      }
    }

    function drawEverything() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (!latestPoseLandmarks) {
        const result = analyzePosture();
        updateUI(result);
        sendPostureState(result.state);
        return;
      }

      const leftShoulder = latestPoseLandmarks[11];
      const rightShoulder = latestPoseLandmarks[12];
      const leftHip = latestPoseLandmarks[23];
      const rightHip = latestPoseLandmarks[24];

      const shoulderCenter = {
        x: (leftShoulder.x + rightShoulder.x) / 2,
        y: (leftShoulder.y + rightShoulder.y) / 2
      };

      const hipCenter = {
        x: (leftHip.x + rightHip.x) / 2,
        y: (leftHip.y + rightHip.y) / 2
      };

      drawLine(leftShoulder, rightShoulder, "#38bdf8", 5);
      drawLine(shoulderCenter, hipCenter, "#a78bfa", 5);

      drawPoint(leftShoulder, "#22c55e");
      drawPoint(rightShoulder, "#22c55e");
      drawPoint(leftHip, "#facc15");
      drawPoint(rightHip, "#facc15");
      drawPoint(shoulderCenter, "#ffffff");
      drawPoint(hipCenter, "#ffffff");

      if (latestFaceLandmarks) {
        const leftEye = latestFaceLandmarks[33];
        const rightEye = latestFaceLandmarks[263];
        const nose = latestFaceLandmarks[1];
        const chin = latestFaceLandmarks[152];

        drawLine(leftEye, rightEye, "#ef4444", 4);
        drawLine(nose, chin, "#fb7185", 3);

        drawPoint(leftEye, "#ef4444");
        drawPoint(rightEye, "#ef4444");
        drawPoint(nose, "#ffffff");
        drawPoint(chin, "#ffffff");
      }

      const result = analyzePosture();
      updateUI(result);
      sendPostureState(result.state);
    }

    const pose = new Pose({
      locateFile: file => {
        return `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`;
      }
    });

    pose.setOptions({
      modelComplexity: 1,
      smoothLandmarks: true,
      enableSegmentation: false,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });

    pose.onResults(onPoseResults);

    const faceMesh = new FaceMesh({
      locateFile: file => {
        return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
      }
    });

    faceMesh.setOptions({
      maxNumFaces: 1,
      refineLandmarks: true,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });

    faceMesh.onResults(onFaceResults);

    document.getElementById("startBtn").addEventListener("click", async () => {
      try {
        const camera = new Camera(video, {
          onFrame: async () => {
            await pose.send({ image: video });
            await faceMesh.send({ image: video });
          },
          width: 960,
          height: 720
        });

        camera.start();
      } catch (err) {
        console.error("카메라 시작 실패:", err);
        alert("카메라를 시작할 수 없습니다. 카메라 권한을 확인하세요.");
      }
    });
  </script>
</body>
</html>
